stages:
  ingest_jolpica:
    cmd: python src/ingestion/ergast_ingestion.py
    deps:
      - src/ingestion/ergast_ingestion.py
    outs:
      - data/raw/jolpica/

  ingest_fastf1:
    cmd: python src/ingestion/fastf1_ingestion.py
    deps:
      - src/ingestion/fastf1_ingestion.py
    outs:
      - data/raw/fastf1/

  preprocess:
    cmd: python pipeline/scripts/csv_to_parquet.py --input-dir data/raw/ --bucket local
    deps:
      - data/raw/
      - pipeline/scripts/csv_to_parquet.py
    outs:
      - data/processed/

  build_features:
    cmd: python ml/features/feature_pipeline.py
    deps:
      - data/processed/
      - ml/features/feature_pipeline.py
    outs:
      - data/features/

  validate:
    cmd: python Data-Pipeline/scripts/validate_data.py
    deps:
      - data/processed/
      - Data-Pipeline/scripts/validate_data.py

  detect_anomalies:
    cmd: python Data-Pipeline/scripts/anomaly_detection.py
    deps:
      - data/processed/
      - Data-Pipeline/scripts/anomaly_detection.py
    outs:
      - Data-Pipeline/logs/anomaly_report.json

  bias_analysis:
    cmd: python Data-Pipeline/scripts/bias_analysis.py
    deps:
      - data/processed/
      - Data-Pipeline/scripts/bias_analysis.py
    outs:
      - Data-Pipeline/logs/bias_report.json
